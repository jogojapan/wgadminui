{% load i18n %}
<div class="d-inline-block text-center">
  <img src="{{ qr_data_uri }}"
       alt="{% blocktranslate with name=peer.name %}WireGuard QR code for {{ name }}{% endblocktranslate %}"
       class="img-fluid border rounded p-2"
       style="max-width: 280px;">
  <p class="text-muted small mt-1">
    <i class="bi bi-exclamation-triangle me-1"></i>
    {% trans "This QR code contains your private key. Only show it in a safe environment." %}
  </p>
</div>
